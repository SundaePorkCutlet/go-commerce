name: Deploy to EC2

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            cd ~/go-commerce
            git fetch origin
            git reset --hard origin/master
            git submodule sync --recursive
            git submodule update --init --recursive
            for service in ORDERFC PRODUCTFC PAYMENTFC USERFC; do
              git -C "$service" fetch origin
              git -C "$service" reset --hard origin/main
            done

            cd ~/go-commerce/tools/project-qa-assistant
            git fetch origin
            git reset --hard origin/main

            cd ~/go-commerce
            npm ci --prefix frontend
            VITE_BASE_PATH=/go-commerce/ npm --prefix frontend run build
            rm -rf tools/project-qa-assistant/apps/web/public/go-commerce
            mkdir -p tools/project-qa-assistant/apps/web/public
            cp -R frontend/dist tools/project-qa-assistant/apps/web/public/go-commerce

            cd ~/go-commerce/tools/project-qa-assistant
            docker compose -f docker-compose.app.yml build web api indexer
            docker compose -f docker-compose.app.yml up -d chroma

            docker compose -f docker-compose.app.yml --profile tools run --rm indexer
            docker compose -f docker-compose.app.yml up -d api web

            docker compose -f docker-compose.app.yml ps
            curl -fsS http://localhost:3001/ > /dev/null
            curl -fsS http://localhost:3001/go-commerce/ > /dev/null

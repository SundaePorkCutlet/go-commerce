apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: go-commerce
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: go-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--requirepass", "admin"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "admin", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: go-commerce
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: go-commerce
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis

apiVersion: apps/v1
kind: Deployment
metadata:
  name: productfc
  namespace: go-commerce
  labels:
    app: productfc
    app.kubernetes.io/name: productfc
    app.kubernetes.io/part-of: go-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productfc
  template:
    metadata:
      labels:
        app: productfc
    spec:
      initContainers:
        - name: wait-for-postgres-product
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-product 5432; do
                echo "waiting for postgres-product:5432"
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis:6379"
                sleep 2
              done
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka 9092; do
                echo "waiting for kafka:9092"
                sleep 2
              done
      containers:
        - name: productfc
          image: go-commerce-productfc:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          volumeMounts:
            - name: productfc-config
              mountPath: /root/files/config/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: productfc-config
          configMap:
            name: productfc-config
---
apiVersion: v1
kind: Service
metadata:
  name: productfc
  namespace: go-commerce
  labels:
    app: productfc
    app.kubernetes.io/name: productfc
    app.kubernetes.io/part-of: go-commerce
spec:
  selector:
    app: productfc
  ports:
    - name: http
      port: 8081
      targetPort: http

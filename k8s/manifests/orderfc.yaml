apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderfc
  namespace: go-commerce
  labels:
    app: orderfc
    app.kubernetes.io/name: orderfc
    app.kubernetes.io/part-of: go-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orderfc
  template:
    metadata:
      labels:
        app: orderfc
    spec:
      initContainers:
        - name: wait-for-postgres-order
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-order 5432; do
                echo "waiting for postgres-order:5432"
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis:6379"
                sleep 2
              done
      containers:
        - name: orderfc
          image: go-commerce-orderfc:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          volumeMounts:
            - name: orderfc-config
              mountPath: /root/files/config/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: orderfc-config
          configMap:
            name: orderfc-config
---
apiVersion: v1
kind: Service
metadata:
  name: orderfc
  namespace: go-commerce
  labels:
    app: orderfc
    app.kubernetes.io/name: orderfc
    app.kubernetes.io/part-of: go-commerce
spec:
  selector:
    app: orderfc
  ports:
    - name: http
      port: 8083
      targetPort: http

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-product
  namespace: go-commerce
  labels:
    app: postgres-product
    app.kubernetes.io/name: postgres-product
    app.kubernetes.io/part-of: go-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-product
  template:
    metadata:
      labels:
        app: postgres-product
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: product
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orderfc-secret
                  key: db-password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "admin", "-d", "product"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-product-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-product-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-product
  namespace: go-commerce
  labels:
    app: postgres-product
    app.kubernetes.io/name: postgres-product
    app.kubernetes.io/part-of: go-commerce
spec:
  selector:
    app: postgres-product
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres

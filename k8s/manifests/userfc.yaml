apiVersion: apps/v1
kind: Deployment
metadata:
  name: userfc
  namespace: go-commerce
  labels:
    app: userfc
    app.kubernetes.io/name: userfc
    app.kubernetes.io/part-of: go-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: userfc
  template:
    metadata:
      labels:
        app: userfc
    spec:
      initContainers:
        - name: wait-for-postgres-user
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-user 5432; do
                echo "waiting for postgres-user:5432"
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis:6379"
                sleep 2
              done
      containers:
        - name: userfc
          image: go-commerce-userfc:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 28080
            - name: grpc
              containerPort: 50051
          volumeMounts:
            - name: userfc-config
              mountPath: /root/files/config/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: userfc-config
          configMap:
            name: userfc-config
---
apiVersion: v1
kind: Service
metadata:
  name: userfc
  namespace: go-commerce
  labels:
    app: userfc
    app.kubernetes.io/name: userfc
    app.kubernetes.io/part-of: go-commerce
spec:
  selector:
    app: userfc
  ports:
    - name: http
      port: 28080
      targetPort: http
    - name: grpc
      port: 50051
      targetPort: grpc

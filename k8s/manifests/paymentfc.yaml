apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentfc
  namespace: go-commerce
  labels:
    app: paymentfc
    app.kubernetes.io/name: paymentfc
    app.kubernetes.io/part-of: go-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paymentfc
  template:
    metadata:
      labels:
        app: paymentfc
    spec:
      initContainers:
        - name: wait-for-postgres-payment
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-payment 5432; do
                echo "waiting for postgres-payment:5432"
                sleep 2
              done
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "waiting for mongodb:27017"
                sleep 2
              done
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka 9092; do
                echo "waiting for kafka:9092"
                sleep 2
              done
      containers:
        - name: paymentfc
          image: go-commerce-paymentfc:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 28083
          volumeMounts:
            - name: paymentfc-config
              mountPath: /root/files/config/config.yaml
              subPath: config.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: paymentfc-config
          configMap:
            name: paymentfc-config
---
apiVersion: v1
kind: Service
metadata:
  name: paymentfc
  namespace: go-commerce
  labels:
    app: paymentfc
    app.kubernetes.io/name: paymentfc
    app.kubernetes.io/part-of: go-commerce
spec:
  selector:
    app: paymentfc
  ports:
    - name: http
      port: 28083
      targetPort: http

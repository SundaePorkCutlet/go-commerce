services:
  # PostgreSQL - USERFC
  postgres-user:
    image: postgres:15
    container_name: go-commerce-postgres-user
    environment:
      POSTGRES_DB: user
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    ports:
      - "5433:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - go-commerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL - PRODUCTFC
  postgres-product:
    image: postgres:15
    container_name: go-commerce-postgres-product
    environment:
      POSTGRES_DB: product
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    ports:
      - "5434:5432"
    volumes:
      - postgres_product_data:/var/lib/postgresql/data
    networks:
      - go-commerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL - ORDERFC
  postgres-order:
    image: postgres:15
    container_name: go-commerce-postgres-order
    environment:
      POSTGRES_DB: order
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    ports:
      - "5435:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    networks:
      - go-commerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL - PAYMENTFC
  postgres-payment:
    image: postgres:15
    container_name: go-commerce-postgres-payment
    environment:
      POSTGRES_DB: payment
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
    ports:
      - "5436:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    networks:
      - go-commerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 캐시
  redis:
    image: redis:7-alpine
    container_name: go-commerce-redis
    command: redis-server --requirepass admin
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - go-commerce-network

  # kafka broker
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: go-commerce-kafka
    ports:
      - "29092:9092"
      - "29093:9093"
    networks:
      - go-commerce-network
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://host.docker.internal:29093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
    depends_on:
      zookeeper:
        condition: service_started
    restart: on-failure

  # zookeeper
  zookeeper:
    image: zookeeper:3.9
    container_name: go-commerce-zookeeper
    ports:
      - "22181:2181"
    networks:
      - go-commerce-network
    restart: on-failure

  # Vault - Secrets Management
  vault:
    image: vault:1.13.3
    container_name: go-commerce-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: fcproject
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/file
    command: server -dev
    networks:
      - go-commerce-network

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: go-commerce-jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - go-commerce-network

  # MongoDB - Audit Logs
  mongodb:
    image: mongo:7
    container_name: go-commerce-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - go-commerce-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # kafdrop
  kafdrop:
    image: obsidiandynamics/kafdrop:3.27.0
    container_name: go-commerce-kafdrop
    ports:
      - "29000:9000"
    networks:
      - go-commerce-network
    environment:
      - KAFKA_BROKER_CONNECT=kafka:9092
      - SERVER_PORT=9000
      - MANAGEMENT_HEALTH_PROBES_ENABLED=true
      - FREEMARKER_TEMPLATES_DEBUG=false
    depends_on:
      - kafka
    restart: on-failure

  # USERFC 서비스
  userfc:
    build:
      context: ./USERFC
      dockerfile: Dockerfile
    container_name: go-commerce-userfc
    ports:
      - "28080:28080"
      - "50051:50051"
    volumes:
      - userfc_logs:/var/log/userfc
    command: sh -c "./main 2>&1 | tee /var/log/userfc/app.log"
    environment:
      - DB_HOST=postgres-user
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_NAME=user
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=admin
      - JAEGER_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - go-commerce-network
    restart: on-failure

  # PRODUCTFC 서비스
  productfc:
    build:
      context: ./PRODUCTFC
      dockerfile: Dockerfile
    container_name: go-commerce-productfc
    ports:
      - "28081:8081"
    volumes:
      - productfc_logs:/var/log/productfc
    command: sh -c "./main 2>&1 | tee /var/log/productfc/app.log"
    environment:
      - DB_HOST=postgres-product
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_NAME=product
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=admin
      - JAEGER_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres-product:
        condition: service_healthy
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - go-commerce-network
    restart: on-failure

  # ORDERFC 서비스
  orderfc:
    build:
      context: ./ORDERFC
      dockerfile: Dockerfile
    container_name: go-commerce-orderfc
    ports:
      - "28082:8083"
    volumes:
      - orderfc_logs:/var/log/orderfc
    command: sh -c "./main 2>&1 | tee /var/log/orderfc/app.log"
    environment:
      - JAEGER_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres-order:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - go-commerce-network
    restart: on-failure

  # PAYMENTFC 서비스
  paymentfc:
    build:
      context: ./PAYMENTFC
      dockerfile: Dockerfile
    container_name: go-commerce-paymentfc
    ports:
      - "28083:28083"
    volumes:
      - paymentfc_logs:/var/log/paymentfc
    command: sh -c "./main 2>&1 | tee /var/log/paymentfc/app.log"
    environment:
      - KAFKA_BROKER=kafka:9092
      - XENDIT_SECRET_API_KEY=${XENDIT_SECRET_API_KEY:-}
      - XENDIT_WEBHOOK_TOKEN=${XENDIT_WEBHOOK_TOKEN:-}
      - MONGO_URI=mongodb://admin:admin@mongodb:27017
      - JAEGER_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres-payment:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      mongodb:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - go-commerce-network
    restart: on-failure

  # Loki — 로그 수집 저장소
  loki:
    image: grafana/loki:2.9.4
    container_name: go-commerce-loki
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - go-commerce-network
    restart: on-failure

  # Prometheus — 메트릭 수집
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: go-commerce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - go-commerce-network
    restart: on-failure

  # Grafana — 대시보드 (Loki + Prometheus 연동)
  grafana:
    image: grafana/grafana:11.2.0
    container_name: go-commerce-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - loki
      - prometheus
    networks:
      - go-commerce-network
    restart: on-failure

  # Promtail — USERFC 로그 수집
  promtail-userfc:
    image: grafana/promtail:2.9.4
    container_name: go-commerce-promtail-userfc
    volumes:
      - ./USERFC/promtail/promtail-config.yml:/etc/promtail/config.yml
      - userfc_logs:/var/log/userfc:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - go-commerce-network
    restart: on-failure

  # Promtail — PRODUCTFC 로그 수집
  promtail-productfc:
    image: grafana/promtail:2.9.4
    container_name: go-commerce-promtail-productfc
    volumes:
      - ./PRODUCTFC/promtail/promtail-config.yml:/etc/promtail/config.yml
      - productfc_logs:/var/log/productfc:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - go-commerce-network
    restart: on-failure

  # Promtail — ORDERFC 로그 수집
  promtail-orderfc:
    image: grafana/promtail:2.9.4
    container_name: go-commerce-promtail-orderfc
    volumes:
      - ./ORDERFC/promtail/promtail-config.yml:/etc/promtail/config.yml
      - orderfc_logs:/var/log/orderfc:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - go-commerce-network
    restart: on-failure

  # Promtail — PAYMENTFC 로그 수집
  promtail-paymentfc:
    image: grafana/promtail:2.9.4
    container_name: go-commerce-promtail-paymentfc
    volumes:
      - ./PAYMENTFC/promtail/promtail-config.yml:/etc/promtail/config.yml
      - paymentfc_logs:/var/log/paymentfc:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - go-commerce-network
    restart: on-failure

  # node_exporter — 호스트 메트릭 (CPU, 메모리, 디스크 등)
  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: go-commerce-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - go-commerce-network
    restart: on-failure

  # Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: go-commerce-frontend
    ports:
      - "3001:80"
    depends_on:
      - userfc
      - productfc
      - orderfc
      - paymentfc
    networks:
      - go-commerce-network
    restart: on-failure

volumes:
  postgres_user_data:
  postgres_product_data:
  postgres_order_data:
  postgres_payment_data:
  redis_data:
  mongodb_data:
  vault_data:
  userfc_logs:
  productfc_logs:
  orderfc_logs:
  paymentfc_logs:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  go-commerce-network:
    driver: bridge

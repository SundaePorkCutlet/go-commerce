server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/userfc/ {
        proxy_pass http://userfc:28080/;
    }

    location /api/productfc/ {
        # 컨테이너 간 통신은 호스트 매핑(28081)이 아니라 서비스가 listen 하는 포트(8081)
        proxy_pass http://productfc:8081/;
    }

    location /api/orderfc/ {
        proxy_pass http://orderfc:8083/;
    }

    location /api/paymentfc/ {
        proxy_pass http://paymentfc:28083/;
    }
}
